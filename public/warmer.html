<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiChat — Warmer</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="sidebar"></div>

  <main class="main-content">
    <div class="page-header">
      <h1>🔥 Warmer</h1>
      <button class="btn btn-primary" onclick="openWarmerModal()">
        <span>➕</span> Warmer Baru
      </button>
    </div>

    <!-- Warmer Jobs Table -->
    <div class="section-card">
      <h2>📋 Senarai Warmer Jobs</h2>
      <div class="table-responsive">
        <table class="table" id="warmer-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Peranti</th>
              <th>Nombor Sasaran</th>
              <th>Mesej</th>
              <th>Interval</th>
              <th>Status</th>
              <th>Jumlah Hantar</th>
              <th>Terakhir Hantar</th>
              <th>Tindakan</th>
            </tr>
          </thead>
          <tbody id="warmer-tbody">
            <tr>
              <td colspan="9" class="text-center text-secondary">Memuatkan...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Create Warmer Modal -->
  <div class="modal-overlay" id="warmerModal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3>🔥 Cipta Warmer Baru</h3>
        <button class="modal-close" onclick="closeWarmerModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="warmerForm" onsubmit="handleCreateWarmer(event)">
          <div class="form-group">
            <label for="warmerDevice">Peranti</label>
            <select id="warmerDevice" class="form-control" required>
              <option value="">-- Pilih Peranti --</option>
            </select>
          </div>
          <div class="form-group">
            <label for="warmerTarget">Nombor Sasaran</label>
            <input type="text" id="warmerTarget" class="form-control" placeholder="cth: 60123456789" required>
          </div>
          <div class="form-group">
            <label for="warmerMessage">Mesej</label>
            <textarea id="warmerMessage" class="form-control" rows="4" placeholder="Taip mesej warmer di sini..." required></textarea>
          </div>
          <div class="form-row">
            <div class="form-group form-group-half">
              <label for="warmerIntervalMin">Interval Min (minit)</label>
              <input type="number" id="warmerIntervalMin" class="form-control" value="30" min="1" required>
            </div>
            <div class="form-group form-group-half">
              <label for="warmerIntervalMax">Interval Max (minit)</label>
              <input type="number" id="warmerIntervalMax" class="form-control" value="60" min="1" required>
            </div>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-outline" onclick="closeWarmerModal()">Batal</button>
            <button type="submit" class="btn btn-primary" id="createWarmerBtn">Cipta Warmer</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/app.js"></script>
  <script>
    loadSidebar();
    initSSE();

    let warmerDevices = [];

    // --- Load Warmers ---
    async function loadWarmers() {
      try {
        const res = await api('/warmer');
        if (res.success) {
          renderWarmers(res.data || []);
        }
      } catch(err) {
        showToast('Gagal muat senarai warmer', 'error');
      }
    }

    function renderWarmers(warmers) {
      const tbody = document.getElementById('warmer-tbody');
      if (!warmers.length) {
        tbody.innerHTML = '<tr><td colspan="9" class="text-center text-secondary">Tiada warmer job. Klik "Warmer Baru" untuk mula.</td></tr>';
        return;
      }
      tbody.innerHTML = warmers.map(w => createWarmerRow(w)).join('');
    }

    function createWarmerRow(w) {
      const msgPreview = (w.message || '').length > 40 ? escapeHtml(w.message.substring(0, 40)) + '...' : escapeHtml(w.message || '');
      const deviceName = w.device_name || w.deviceName || 'Peranti #' + (w.device_id || w.deviceId || '?');
      const statusBadge = getWarmerStatusBadge(w.status);
      const lastSent = w.last_sent ? new Date(w.last_sent).toLocaleString('ms-MY') : '—';
      const totalSent = w.total_sent != null ? w.total_sent : 0;
      const intervalMin = w.interval_min || w.intervalMin || 30;
      const intervalMax = w.interval_max || w.intervalMax || 60;

      let actions = '';
      if (w.status === 'active' || w.status === 'running') {
        actions += `<button class="btn btn-sm btn-warning" onclick="stopWarmer(${w.id})">⏸ Henti</button> `;
      } else if (w.status === 'paused' || w.status === 'pending' || w.status === 'stopped') {
        actions += `<button class="btn btn-sm btn-primary" onclick="startWarmer(${w.id})">▶ Mula</button> `;
      }
      actions += `<button class="btn btn-sm btn-danger" onclick="deleteWarmer(${w.id})">🗑 Padam</button>`;

      return `
        <tr data-warmer-id="${w.id}">
          <td>#${w.id}</td>
          <td>${escapeHtml(deviceName)}</td>
          <td>${escapeHtml(w.target_phone || w.targetPhone || '')}</td>
          <td title="${escapeHtml(w.message || '')}">${msgPreview}</td>
          <td>${intervalMin}–${intervalMax} min</td>
          <td>${statusBadge}</td>
          <td class="warmer-total-sent">${totalSent}</td>
          <td class="warmer-last-sent">${lastSent}</td>
          <td class="table-actions">${actions}</td>
        </tr>
      `;
    }

    function getWarmerStatusBadge(status) {
      const map = {
        pending: '<span class="status-badge warning">Pending</span>',
        active: '<span class="status-badge connected">Active</span>',
        running: '<span class="status-badge info">Running</span>',
        paused: '<span class="status-badge warning">Paused</span>',
        stopped: '<span class="status-badge disconnected">Stopped</span>'
      };
      return map[status] || `<span class="status-badge">${escapeHtml(status || 'unknown')}</span>`;
    }

    // --- Load Devices for selector ---
    async function loadDevicesForWarmer() {
      try {
        const res = await api('/devices');
        if (res.success) {
          warmerDevices = (res.data || []).filter(d => d.status === 'connected');
          const select = document.getElementById('warmerDevice');
          select.innerHTML = '<option value="">-- Pilih Peranti --</option>' +
            warmerDevices.map(d => `<option value="${d.id}">${escapeHtml(d.name)}${d.phone ? ' (' + escapeHtml(d.phone) + ')' : ''}</option>`).join('');
        }
      } catch(err) {
        // Silently fail
      }
    }

    // --- Open / Close Modal ---
    function openWarmerModal() {
      loadDevicesForWarmer();
      document.getElementById('warmerTarget').value = '';
      document.getElementById('warmerMessage').value = '';
      document.getElementById('warmerIntervalMin').value = '30';
      document.getElementById('warmerIntervalMax').value = '60';
      document.getElementById('warmerModal').style.display = 'flex';
    }

    function closeWarmerModal() {
      document.getElementById('warmerModal').style.display = 'none';
    }

    // --- Create Warmer ---
    async function handleCreateWarmer(e) {
      e.preventDefault();
      const deviceId = document.getElementById('warmerDevice').value;
      const targetPhone = document.getElementById('warmerTarget').value.trim();
      const message = document.getElementById('warmerMessage').value.trim();
      const intervalMin = parseInt(document.getElementById('warmerIntervalMin').value) || 30;
      const intervalMax = parseInt(document.getElementById('warmerIntervalMax').value) || 60;

      if (!deviceId) { showToast('Sila pilih peranti', 'error'); return; }
      if (!targetPhone) { showToast('Sila masukkan nombor sasaran', 'error'); return; }
      if (!message) { showToast('Sila masukkan mesej', 'error'); return; }
      if (intervalMin > intervalMax) { showToast('Interval min tidak boleh melebihi interval max', 'error'); return; }

      const btn = document.getElementById('createWarmerBtn');
      btn.disabled = true;
      btn.textContent = 'Mencipta...';

      try {
        const res = await api('/warmer', {
          method: 'POST',
          body: JSON.stringify({ deviceId, targetPhone, message, intervalMin, intervalMax })
        });
        if (res.success) {
          showToast('Warmer berjaya dicipta!', 'success');
          closeWarmerModal();
          const tbody = document.getElementById('warmer-tbody');
          const emptyRow = tbody.querySelector('td[colspan]');
          if (emptyRow) emptyRow.parentElement.remove();
          tbody.insertAdjacentHTML('afterbegin', createWarmerRow(res.data));
        }
      } catch(err) {
        showToast(err.message || 'Gagal mencipta warmer', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Cipta Warmer';
      }
    }

    // --- Start Warmer ---
    async function startWarmer(id) {
      try {
        const res = await api(`/warmer/${id}/start`, { method: 'POST' });
        if (res.success) {
          showToast('Warmer dimulakan!', 'success');
          const row = document.querySelector(`[data-warmer-id="${id}"]`);
          if (row) {
            row.children[5].innerHTML = getWarmerStatusBadge('active');
            const actionsCell = row.querySelector('.table-actions');
            if (actionsCell) {
              actionsCell.innerHTML = `
                <button class="btn btn-sm btn-warning" onclick="stopWarmer(${id})">⏸ Henti</button>
                <button class="btn btn-sm btn-danger" onclick="deleteWarmer(${id})">🗑 Padam</button>
              `;
            }
          }
        }
      } catch(err) {
        showToast(err.message || 'Gagal memulakan warmer', 'error');
      }
    }

    // --- Stop Warmer ---
    async function stopWarmer(id) {
      try {
        const res = await api(`/warmer/${id}/stop`, { method: 'POST' });
        if (res.success) {
          showToast('Warmer dihentikan', 'success');
          const row = document.querySelector(`[data-warmer-id="${id}"]`);
          if (row) {
            row.children[5].innerHTML = getWarmerStatusBadge('stopped');
            const actionsCell = row.querySelector('.table-actions');
            if (actionsCell) {
              actionsCell.innerHTML = `
                <button class="btn btn-sm btn-primary" onclick="startWarmer(${id})">▶ Mula</button>
                <button class="btn btn-sm btn-danger" onclick="deleteWarmer(${id})">🗑 Padam</button>
              `;
            }
          }
        }
      } catch(err) {
        showToast(err.message || 'Gagal menghentikan warmer', 'error');
      }
    }

    // --- Delete Warmer ---
    async function deleteWarmer(id) {
      if (!confirm('Adakah anda pasti mahu memadam warmer ini?')) return;
      try {
        const res = await api(`/warmer/${id}`, { method: 'DELETE' });
        if (res.success) {
          showToast('Warmer berjaya dipadam', 'success');
          const row = document.querySelector(`[data-warmer-id="${id}"]`);
          if (row) row.remove();
          // Check if table is empty
          const tbody = document.getElementById('warmer-tbody');
          if (!tbody.children.length) {
            tbody.innerHTML = '<tr><td colspan="9" class="text-center text-secondary">Tiada warmer job. Klik "Warmer Baru" untuk mula.</td></tr>';
          }
        }
      } catch(err) {
        showToast(err.message || 'Gagal memadam warmer', 'error');
      }
    }

    // --- SSE: Warmer Update Handler (targeted update) ---
    document.addEventListener('sse:warmer-update', (e) => {
      const data = e.detail;
      const row = document.querySelector(`[data-warmer-id="${data.warmerId}"]`);
      if (!row) return;

      const totalSentEl = row.querySelector('.warmer-total-sent');
      if (totalSentEl && data.totalSent != null) {
        totalSentEl.textContent = data.totalSent;
      }

      const lastSentEl = row.querySelector('.warmer-last-sent');
      if (lastSentEl && data.lastSent) {
        lastSentEl.textContent = new Date(data.lastSent).toLocaleString('ms-MY');
      }
    });

    // Initial load
    loadWarmers();
  </script>
</body>
</html>
