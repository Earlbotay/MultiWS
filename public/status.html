<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiChat — Status Peranti</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="sidebar"></div>

  <main class="main-content">
    <div class="page-header">
      <h1>📊 Status Peranti</h1>
      <button class="btn btn-outline" onclick="loadStatus()">
        🔄 Muat Semula
      </button>
    </div>

    <!-- Summary Cards -->
    <div class="stats-grid" id="status-summary">
      <div class="stat-card">
        <div class="stat-icon">📱</div>
        <div class="stat-info">
          <span class="stat-value" id="totalDevices">—</span>
          <span class="stat-label">Total Peranti</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🟢</div>
        <div class="stat-info">
          <span class="stat-value" id="connectedDevices">—</span>
          <span class="stat-label">Disambung</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔴</div>
        <div class="stat-info">
          <span class="stat-value" id="disconnectedDevices">—</span>
          <span class="stat-label">Terputus</span>
        </div>
      </div>
    </div>

    <!-- Devices Status Table -->
    <div class="section-card">
      <h2>📋 Senarai Peranti</h2>
      <small class="text-secondary">Auto-refresh setiap 30 saat</small>
      <div class="table-responsive" style="margin-top:12px;">
        <table class="table" id="status-table">
          <thead>
            <tr>
              <th>Nama</th>
              <th>Nombor Telefon</th>
              <th>Status</th>
              <th>Uptime</th>
              <th>Mesej Dihantar</th>
            </tr>
          </thead>
          <tbody id="status-tbody">
            <tr>
              <td colspan="5" class="text-center text-secondary">Memuatkan...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="toast-container"></div>
  <script src="/js/app.js"></script>
  <script>
    loadSidebar();
    initSSE();

    // --- Load Status ---
    async function loadStatus() {
      try {
        const res = await api('/status');
        if (res.success) {
          const data = res.data || {};
          const devices = data.devices || [];

          // Update summary cards
          const total = devices.length;
          const connected = devices.filter(d => d.status === 'connected').length;
          const disconnected = total - connected;

          document.getElementById('totalDevices').textContent = total;
          document.getElementById('connectedDevices').textContent = connected;
          document.getElementById('disconnectedDevices').textContent = disconnected;

          // Render table
          renderStatusTable(devices);
        }
      } catch(err) {
        showToast('Gagal muat status peranti', 'error');
      }
    }

    function renderStatusTable(devices) {
      const tbody = document.getElementById('status-tbody');
      if (!devices.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-secondary">Tiada peranti</td></tr>';
        return;
      }
      tbody.innerHTML = devices.map(d => {
        const statusClass = d.status === 'connected' ? 'connected' : 'disconnected';
        const statusText = d.status === 'connected' ? 'Disambung' : 'Terputus';
        const uptime = d.uptime || '—';
        const msgSent = d.messages_sent != null ? d.messages_sent : (d.messagesSent != null ? d.messagesSent : '—');

        return `
          <tr data-device-id="${d.id}">
            <td>${escapeHtml(d.name || '')}</td>
            <td>${escapeHtml(d.phone || '—')}</td>
            <td><span class="status-badge ${statusClass}">${statusText}</span></td>
            <td class="device-uptime">${escapeHtml(String(uptime))}</td>
            <td class="device-msg-sent">${msgSent}</td>
          </tr>
        `;
      }).join('');
    }

    // --- SSE: Device Status Handler (targeted update) ---
    document.addEventListener('sse:device-status', (e) => {
      const data = e.detail;
      const row = document.querySelector(`tr[data-device-id="${data.deviceId}"]`);
      if (row) {
        // Update status badge
        const statusCell = row.children[2];
        if (statusCell) {
          const statusClass = data.status === 'connected' ? 'connected' : 'disconnected';
          const statusText = data.status === 'connected' ? 'Disambung' : 'Terputus';
          statusCell.innerHTML = `<span class="status-badge ${statusClass}">${statusText}</span>`;
        }

        // Update phone if provided
        if (data.phone) {
          row.children[1].textContent = data.phone;
        }
      }

      // Update summary counts
      const allRows = document.querySelectorAll('#status-tbody tr[data-device-id]');
      let connCount = 0;
      allRows.forEach(r => {
        const badge = r.querySelector('.status-badge');
        if (badge && badge.classList.contains('connected')) connCount++;
      });
      const totalEl = document.getElementById('totalDevices');
      const connEl = document.getElementById('connectedDevices');
      const discEl = document.getElementById('disconnectedDevices');
      const total = allRows.length;
      if (totalEl) totalEl.textContent = total;
      if (connEl) connEl.textContent = connCount;
      if (discEl) discEl.textContent = total - connCount;
    });

    // Auto-refresh every 30 seconds
    setInterval(loadStatus, 30000);

    // Initial load
    loadStatus();
  </script>
</body>
</html>
