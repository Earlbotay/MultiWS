name: MultiChat Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      PORT: 8080
      DATA_DIR: ./MULTIWSDATA
      NODE_ENV: production
      CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
      DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
      DATA_REPO: ${{ secrets.DATA_REPO }}
      ADMIN_USER: ${{ secrets.ADMIN_USER }}
      ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clone data repo
        run: |
          git clone https://x-access-token:${DATA_REPO_TOKEN}@github.com/${DATA_REPO}.git ${DATA_DIR} || true
          cd ${DATA_DIR}
          git config user.name "MultiChat Bot"
          git config user.email "multichat@bot.local"

      - name: Create data directories
        run: |
          mkdir -p ${DATA_DIR}/sessions
          mkdir -p ${DATA_DIR}/db
          mkdir -p ${DATA_DIR}/logs
          mkdir -p ${DATA_DIR}/auth
          mkdir -p ${DATA_DIR}/uploads

      - name: Install Cloudflare Tunnel
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb
          rm cloudflared.deb

      - name: Start Cloudflare Tunnel
        run: |
          nohup cloudflared tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN} &
          sleep 5
          echo "✅ Cloudflare Tunnel started"

      - name: Start MultiChat
        run: |
          node src/server.js &
          sleep 5
          echo "✅ MultiChat started on port ${PORT}"

      - name: Health check
        run: |
          for i in {1..10}; do
            if curl -sf http://localhost:${PORT}/api/health; then
              echo ""
              echo "✅ Health check passed"
              break
            fi
            echo "⏳ Waiting for server... attempt $i"
            sleep 3
          done

      - name: Keep alive
        run: |
          echo "🟢 MultiChat is running..."
          echo "   Press cancel to stop the workflow"
          while true; do
            sleep 60
            # Health check every minute
            if ! curl -sf http://localhost:${PORT}/api/health > /dev/null 2>&1; then
              echo "⚠️ Health check failed, restarting..."
              node src/server.js &
              sleep 5
            fi
            # Sync data every 5 minutes
            MINUTES=$(( $(date +%s) / 60 % 5 ))
            if [ "$MINUTES" -eq "0" ]; then
              cd ${DATA_DIR} && git add -A && git diff --cached --quiet || git commit -m "auto-sync $(date '+%Y-%m-%d %H:%M:%S')" && git push || true
              cd ..
            fi
          done
