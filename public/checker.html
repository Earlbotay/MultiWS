<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multichat - Checker</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">✅ Checker</h1>
        <p class="page-subtitle">Semak status nombor WhatsApp</p>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Semak Nombor</h3>
      </div>

      <div class="form-group">
        <label class="form-label">Peranti</label>
        <select class="form-select" id="checkerDevice"></select>
      </div>

      <div class="form-group">
        <label class="form-label">Senarai Nombor (satu per baris)</label>
        <textarea class="form-textarea" id="checkerPhones" placeholder="60123456789&#10;60198765432&#10;..." rows="6"></textarea>
      </div>

      <button class="btn btn-primary" id="checkBtn" onclick="checkNumbers()">✅ Semak Nombor</button>
    </div>

    <div class="card mt-4" id="resultsCard" style="display:none;">
      <div class="card-header">
        <h3 class="card-title">Keputusan</h3>
        <div class="flex gap-2">
          <span class="badge badge-success" id="validCount">0 sah</span>
          <span class="badge badge-danger" id="invalidCount">0 tidak sah</span>
        </div>
      </div>
      <div class="table-container">
        <table>
          <thead><tr><th>Nombor</th><th>Status</th></tr></thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    async function loadDevices() {
      try {
        const res = await api('/api/devices');
        document.getElementById('checkerDevice').innerHTML = (res.data || []).map(d =>
          `<option value="${d.id}">${escapeHtml(d.name)} ${d.status === 'connected' ? '🟢' : '🔴'}</option>`
        ).join('');
      } catch (err) {}
    }

    async function checkNumbers() {
      const phones = document.getElementById('checkerPhones').value.split('\n').map(p => p.trim()).filter(Boolean);
      if (phones.length === 0) return showToast('Sila masukkan nombor untuk disemak', 'warning');

      const deviceId = document.getElementById('checkerDevice').value;
      if (!deviceId) return showToast('Sila pilih peranti', 'warning');

      const btn = document.getElementById('checkBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="progress-ring"></span> Menyemak...';

      try {
        const res = await api('/api/checker/check', {
          method: 'POST',
          body: JSON.stringify({ deviceId: parseInt(deviceId), phones })
        });

        const results = res.data || [];
        const valid = results.filter(r => r.exists);
        const invalid = results.filter(r => !r.exists);

        document.getElementById('validCount').textContent = `${valid.length} sah`;
        document.getElementById('invalidCount').textContent = `${invalid.length} tidak sah`;
        document.getElementById('resultsBody').innerHTML = results.map(r => `
          <tr>
            <td>${escapeHtml(r.phone)}</td>
            <td><span class="badge badge-${r.exists ? 'success' : 'danger'}">${r.exists ? 'WhatsApp aktif' : 'Tiada WhatsApp'}</span></td>
          </tr>
        `).join('');

        document.getElementById('resultsCard').style.display = '';
        showToast(`Semakan selesai: ${valid.length} sah, ${invalid.length} tidak sah`, 'success');
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '✅ Semak Nombor';
      }
    }

    (async () => {
      if (!await initPage('checker')) return;
      await loadDevices();
    })();
  </script>
</body>
</html>
