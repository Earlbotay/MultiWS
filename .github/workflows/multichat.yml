name: Multichat Platform
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: deps-${{ hashFiles('package.json') }}
          restore-keys: deps-

      - name: Install dependencies
        run: npm install --production

      - name: Clone data repo
        run: |
          git clone https://x-access-token:${{ secrets.DATA_REPO_TOKEN }}@github.com/${{ secrets.DATA_REPO }}.git MULTIWSDATA
          mkdir -p MULTIWSDATA/sessions MULTIWSDATA/uploads MULTIWSDATA/db MULTIWSDATA/logs
          cd MULTIWSDATA
          git config user.email "multichat-bot@users.noreply.github.com"
          git config user.name "Multichat Bot"
          printf '*.db-wal\n*.db-shm\n*.log\n' > .gitignore

          if [ -z "$(git log --oneline 2>/dev/null)" ]; then
            git add -A
            git commit -m "init: struktur data awal" || true
            git push origin main || git push origin HEAD:main
          fi
          cd ..

      - name: Install Cloudflare Tunnel
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared

      - name: Start services
        env:
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
          DATA_DIR: ./MULTIWSDATA
          NODE_ENV: production
          PORT: 8080
          SESSION_SECRET: ${{ github.sha }}
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
        run: |
          ./cloudflared tunnel run --token $CF_TUNNEL_TOKEN &
          CF_PID=$!

          node src/server.js &
          APP_PID=$!

          echo "Multichat dimulakan pada port 8080"
          sleep 17700

          echo "Mematikan perkhidmatan..."
          kill -SIGTERM $APP_PID 2>/dev/null

          for i in $(seq 1 30); do
            if ! kill -0 $APP_PID 2>/dev/null; then
              echo "Aplikasi ditutup dengan selamat"
              break
            fi
            sleep 1
          done

          kill -9 $APP_PID 2>/dev/null || true
          kill $CF_PID 2>/dev/null
          echo "Multichat dimatikan."
