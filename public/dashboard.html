<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multichat - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="content" id="mainContent">
    <div class="content-header">
      <h1>Dashboard</h1>
      <p id="greeting">Selamat datang!</p>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon green"><i class="fas fa-mobile-screen-button"></i></div>
        <div class="stat-info">
          <h3 id="statDevices">-</h3>
          <p>Jumlah Peranti</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue"><i class="fas fa-wifi"></i></div>
        <div class="stat-info">
          <h3 id="statActive">-</h3>
          <p>Peranti Aktif</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon purple"><i class="fas fa-paper-plane"></i></div>
        <div class="stat-info">
          <h3 id="statMessages">-</h3>
          <p>Mesej Dihantar</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange"><i class="fas fa-robot"></i></div>
        <div class="stat-info">
          <h3 id="statAutoReply">-</h3>
          <p>Auto Balas Aktif</p>
        </div>
      </div>
    </div>

    <!-- Two column layout -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px;">
      <!-- Recent Broadcasts -->
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-paper-plane" style="margin-right: 8px; color: #9b59b6;"></i>Broadcast Terkini</h2>
          <a href="/blast.html" class="btn btn-sm btn-secondary">Lihat Semua</a>
        </div>
        <div class="card-body" id="recentBlasts">
          <div class="loading-overlay">
            <div class="spinner"></div>
            <span>Memuatkan...</span>
          </div>
        </div>
      </div>

      <!-- Active Warmers -->
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-fire" style="margin-right: 8px; color: #f39c12;"></i>Sesi Pemanasan Aktif</h2>
          <a href="/warmer.html" class="btn btn-sm btn-secondary">Lihat Semua</a>
        </div>
        <div class="card-body" id="activeWarmers">
          <div class="loading-overlay">
            <div class="spinner"></div>
            <span>Memuatkan...</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="card">
      <div class="card-header">
        <h2><i class="fas fa-bolt" style="margin-right: 8px; color: #f39c12;"></i>Tindakan Pantas</h2>
      </div>
      <div class="card-body">
        <div class="quick-actions">
          <a href="/device.html" class="quick-action-btn">
            <i class="fas fa-plus-circle"></i>
            Sambung Peranti
          </a>
          <a href="/blast.html" class="quick-action-btn">
            <i class="fas fa-paper-plane"></i>
            Buat Broadcast
          </a>
          <a href="/checker.html" class="quick-action-btn">
            <i class="fas fa-magnifying-glass"></i>
            Semak Nombor
          </a>
          <a href="/chat.html" class="quick-action-btn">
            <i class="fas fa-comments"></i>
            Buka Ruang Chat
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Fetch user info
      try {
        const user = await api.get('/api/auth/me');
        if (user && user.username) {
          const hour = new Date().getHours();
          let greet = 'Selamat datang';
          if (hour < 12) greet = 'Selamat pagi';
          else if (hour < 15) greet = 'Selamat tengah hari';
          else if (hour < 18) greet = 'Selamat petang';
          else greet = 'Selamat malam';
          document.getElementById('greeting').textContent = `${greet}, ${user.username}!`;
        }
      } catch (_) {}

      // Fetch devices
      try {
        const devices = await api.get('/api/devices');
        const list = devices.devices || devices || [];
        document.getElementById('statDevices').textContent = list.length;
        const active = list.filter(d => d.status === 'connected').length;
        document.getElementById('statActive').textContent = active;
      } catch (_) {
        document.getElementById('statDevices').textContent = '0';
        document.getElementById('statActive').textContent = '0';
      }

      // Fetch stats
      try {
        const stats = await api.get('/api/stats');
        document.getElementById('statMessages').textContent = (stats.messagesSent || 0).toLocaleString();
        document.getElementById('statAutoReply').textContent = stats.autoRepliesActive || 0;
      } catch (_) {
        document.getElementById('statMessages').textContent = '0';
        document.getElementById('statAutoReply').textContent = '0';
      }

      // Fetch recent blasts
      try {
        const blasts = await api.get('/api/blast/jobs');
        const jobs = (blasts.jobs || blasts || []).slice(0, 5);
        const container = document.getElementById('recentBlasts');
        if (jobs.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-paper-plane"></i>
              <p>Tiada broadcast terkini</p>
            </div>`;
        } else {
          container.innerHTML = `
            <table>
              <thead><tr>
                <th>Nama</th>
                <th>Status</th>
                <th>Masa</th>
              </tr></thead>
              <tbody>${jobs.map(j => `
                <tr>
                  <td>${escapeHtml(j.name || '-')}</td>
                  <td><span class="badge badge-${j.status === 'completed' ? 'connected' : j.status === 'running' ? 'waiting' : 'pending'}">${j.status || '-'}</span></td>
                  <td>${timeAgo(j.createdAt || j.created_at)}</td>
                </tr>`).join('')}
              </tbody>
            </table>`;
        }
      } catch (_) {
        document.getElementById('recentBlasts').innerHTML = `
          <div class="empty-state">
            <i class="fas fa-paper-plane"></i>
            <p>Tiada broadcast terkini</p>
          </div>`;
      }

      // Fetch active warmers
      try {
        const warmers = await api.get('/api/warmer/sessions');
        const sessions = (warmers.sessions || warmers || []).filter(s => s.status === 'running').slice(0, 5);
        const container = document.getElementById('activeWarmers');
        if (sessions.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-fire"></i>
              <p>Tiada sesi pemanasan aktif</p>
            </div>`;
        } else {
          container.innerHTML = `
            <table>
              <thead><tr>
                <th>Peranti</th>
                <th>Status</th>
                <th>Bermula</th>
              </tr></thead>
              <tbody>${sessions.map(s => `
                <tr>
                  <td>${escapeHtml(s.deviceName || s.device_name || '-')}</td>
                  <td><span class="badge badge-connected">Aktif</span></td>
                  <td>${timeAgo(s.startedAt || s.started_at)}</td>
                </tr>`).join('')}
              </tbody>
            </table>`;
        }
      } catch (_) {
        document.getElementById('activeWarmers').innerHTML = `
          <div class="empty-state">
            <i class="fas fa-fire"></i>
            <p>Tiada sesi pemanasan aktif</p>
          </div>`;
      }
    });
  </script>

  <style>
    @media (max-width: 768px) {
      div[style*="grid-template-columns: 1fr 1fr"] {
        grid-template-columns: 1fr !important;
      }
    }
  </style>

</body>
</html>
