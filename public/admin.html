<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiChat — Panel Admin</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="sidebar"></div>

  <main class="main-content">
    <div class="page-header">
      <h1>🛡️ Panel Admin</h1>
      <button class="btn btn-primary" onclick="openCreateUserModal()">
        <span>➕</span> Tambah Pengguna
      </button>
    </div>

    <!-- System Stats Cards -->
    <div class="stats-grid" id="admin-stats">
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-info">
          <span class="stat-value" id="statTotalUsers">—</span>
          <span class="stat-label">Jumlah Pengguna</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📱</div>
        <div class="stat-info">
          <span class="stat-value" id="statTotalDevices">—</span>
          <span class="stat-label">Jumlah Peranti</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🟢</div>
        <div class="stat-info">
          <span class="stat-value" id="statActiveDevices">—</span>
          <span class="stat-label">Peranti Aktif</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💬</div>
        <div class="stat-info">
          <span class="stat-value" id="statTotalMessages">—</span>
          <span class="stat-label">Jumlah Mesej</span>
        </div>
      </div>
    </div>

    <!-- Users Section -->
    <div class="section-card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
        <h2 style="margin:0;">👥 Senarai Pengguna</h2>
        <div class="form-group" style="margin:0;min-width:250px;">
          <input type="text" id="userSearch" class="form-control" placeholder="🔍 Cari pengguna..." oninput="handleSearchInput()">
        </div>
      </div>
      <div class="table-responsive">
        <table class="table" id="users-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Role</th>
              <th>Peranti</th>
              <th>Tarikh Cipta</th>
              <th>Tindakan</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr>
              <td colspan="6" class="text-center text-secondary">Memuatkan...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Create User Modal -->
  <div class="modal-overlay" id="createUserModal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3>➕ Tambah Pengguna Baru</h3>
        <button class="modal-close" onclick="closeCreateUserModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="createUserForm" onsubmit="handleCreateUser(event)">
          <div class="form-group">
            <label for="newUsername">Username</label>
            <input type="text" id="newUsername" class="form-control" placeholder="Masukkan username" required minlength="3">
          </div>
          <div class="form-group">
            <label for="newPassword">Password</label>
            <input type="password" id="newPassword" class="form-control" placeholder="Minimum 6 aksara" required minlength="6">
          </div>
          <div class="form-group">
            <label for="newRole">Role</label>
            <select id="newRole" class="form-control" required>
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-outline" onclick="closeCreateUserModal()">Batal</button>
            <button type="submit" class="btn btn-primary" id="createUserBtn">Cipta Pengguna</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- User Detail Modal -->
  <div class="modal-overlay" id="userDetailModal" style="display:none;">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3>👤 Detail Pengguna</h3>
        <button class="modal-close" onclick="closeUserDetailModal()">&times;</button>
      </div>
      <div class="modal-body" id="userDetailBody">
        <p class="text-center text-secondary">Memuatkan...</p>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/app.js"></script>
  <script>
    let currentUserId = null;
    let searchTimeout = null;

    // --- Check Admin Role ---
    async function checkAdmin() {
      try {
        const res = await api('/auth/me');
        if (res.success) {
          currentUserId = res.data.id || res.data.userId;
          if (res.data.role !== 'admin') {
            showToast('Akses ditolak. Anda bukan admin.', 'error');
            setTimeout(() => { window.location.href = '/dashboard.html'; }, 1000);
            return false;
          }
          return true;
        }
      } catch(err) {
        window.location.href = '/dashboard.html';
        return false;
      }
      return false;
    }

    // --- Load Stats ---
    async function loadStats() {
      try {
        const res = await api('/admin/stats');
        if (res.success) {
          const s = res.data || {};
          document.getElementById('statTotalUsers').textContent = s.totalUsers != null ? s.totalUsers : '—';
          document.getElementById('statTotalDevices').textContent = s.totalDevices != null ? s.totalDevices : '—';
          document.getElementById('statActiveDevices').textContent = s.activeDevices != null ? s.activeDevices : (s.connectedDevices != null ? s.connectedDevices : '—');
          document.getElementById('statTotalMessages').textContent = s.totalMessages != null ? s.totalMessages : '—';
        }
      } catch(err) {
        // Silently fail
      }
    }

    // --- Load Users ---
    async function loadUsers(search) {
      try {
        let url = '/admin/users';
        if (search) url += '?search=' + encodeURIComponent(search);
        const res = await api(url);
        if (res.success) {
          renderUsers(res.data || []);
        }
      } catch(err) {
        showToast('Gagal muat senarai pengguna', 'error');
      }
    }

    function renderUsers(users) {
      const tbody = document.getElementById('users-tbody');
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-secondary">Tiada pengguna dijumpai</td></tr>';
        return;
      }
      tbody.innerHTML = users.map(u => {
        const roleBadge = u.role === 'admin'
          ? '<span class="status-badge warning">Admin</span>'
          : '<span class="status-badge info">User</span>';
        const deviceCount = u.device_count != null ? u.device_count : (u.deviceCount != null ? u.deviceCount : '—');
        const createdAt = u.created_at ? new Date(u.created_at).toLocaleString('ms-MY') : '—';
        const isSelf = u.id === currentUserId;

        return `
          <tr data-user-id="${u.id}">
            <td>#${u.id}</td>
            <td>${escapeHtml(u.username || '')}</td>
            <td>${roleBadge}</td>
            <td>${deviceCount}</td>
            <td>${createdAt}</td>
            <td class="table-actions">
              <button class="btn btn-sm btn-outline" onclick="viewUser(${u.id})">👁 Lihat</button>
              ${isSelf ? '' : `<button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id}, '${escapeHtml(u.username || '')}')">🗑 Padam</button>`}
            </td>
          </tr>
        `;
      }).join('');
    }

    // --- Search with Debounce ---
    function handleSearchInput() {
      const query = document.getElementById('userSearch').value.trim();
      if (searchTimeout) clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        loadUsers(query);
      }, 400);
    }

    // --- Open / Close Create User Modal ---
    function openCreateUserModal() {
      document.getElementById('newUsername').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('newRole').value = 'user';
      document.getElementById('createUserModal').style.display = 'flex';
    }

    function closeCreateUserModal() {
      document.getElementById('createUserModal').style.display = 'none';
    }

    // --- Create User ---
    async function handleCreateUser(e) {
      e.preventDefault();
      const username = document.getElementById('newUsername').value.trim();
      const password = document.getElementById('newPassword').value;
      const role = document.getElementById('newRole').value;

      if (!username) { showToast('Sila masukkan username', 'error'); return; }
      if (password.length < 6) { showToast('Password minimum 6 aksara', 'error'); return; }

      const btn = document.getElementById('createUserBtn');
      btn.disabled = true;
      btn.textContent = 'Mencipta...';

      try {
        const res = await api('/admin/users', {
          method: 'POST',
          body: JSON.stringify({ username, password, role })
        });
        if (res.success) {
          showToast(`Pengguna "${username}" berjaya dicipta!`, 'success');
          closeCreateUserModal();
          loadUsers();
          loadStats();
        }
      } catch(err) {
        showToast(err.message || 'Gagal mencipta pengguna', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Cipta Pengguna';
      }
    }

    // --- View User Detail ---
    function closeUserDetailModal() {
      document.getElementById('userDetailModal').style.display = 'none';
    }

    async function viewUser(id) {
      document.getElementById('userDetailModal').style.display = 'flex';
      document.getElementById('userDetailBody').innerHTML = '<p class="text-center text-secondary">Memuatkan...</p>';

      try {
        const res = await api(`/admin/users/${id}`);
        if (res.success) {
          const u = res.data || {};
          const devices = u.devices || [];
          const roleBadge = u.role === 'admin'
            ? '<span class="status-badge warning">Admin</span>'
            : '<span class="status-badge info">User</span>';
          const createdAt = u.created_at ? new Date(u.created_at).toLocaleString('ms-MY') : '—';

          let devicesHtml = '';
          if (devices.length) {
            devicesHtml = `
              <h4 style="margin:16px 0 8px;">📱 Peranti (${devices.length})</h4>
              <div class="table-responsive">
                <table class="table">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Nama</th>
                      <th>Nombor</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${devices.map(d => {
                      const statusClass = d.status === 'connected' ? 'connected' : 'disconnected';
                      return `
                        <tr>
                          <td>#${d.id}</td>
                          <td>${escapeHtml(d.name || '')}</td>
                          <td>${escapeHtml(d.phone || '—')}</td>
                          <td><span class="status-badge ${statusClass}">${escapeHtml(d.status || 'disconnected')}</span></td>
                        </tr>
                      `;
                    }).join('')}
                  </tbody>
                </table>
              </div>
            `;
          } else {
            devicesHtml = '<p class="text-secondary" style="margin-top:16px;">Tiada peranti</p>';
          }

          document.getElementById('userDetailBody').innerHTML = `
            <div class="form-row">
              <div class="form-group form-group-half">
                <label>Username</label>
                <p style="font-size:1.1em;font-weight:600;">${escapeHtml(u.username || '')}</p>
              </div>
              <div class="form-group form-group-half">
                <label>Role</label>
                <p>${roleBadge}</p>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group form-group-half">
                <label>ID</label>
                <p>#${u.id || '—'}</p>
              </div>
              <div class="form-group form-group-half">
                <label>Tarikh Cipta</label>
                <p>${createdAt}</p>
              </div>
            </div>
            ${devicesHtml}
          `;
        }
      } catch(err) {
        document.getElementById('userDetailBody').innerHTML = `<p class="text-danger">Gagal muat detail pengguna: ${escapeHtml(err.message || '')}</p>`;
      }
    }

    // --- Delete User ---
    async function deleteUser(id, username) {
      if (id === currentUserId) {
        showToast('Anda tidak boleh memadam akaun sendiri', 'error');
        return;
      }
      if (!confirm(`Adakah anda pasti mahu memadam pengguna "${username}"?\n\nSemua data berkaitan (peranti, mesej, dll.) akan turut dipadam.`)) return;

      try {
        const res = await api(`/admin/users/${id}`, { method: 'DELETE' });
        if (res.success) {
          showToast(`Pengguna "${username}" berjaya dipadam`, 'success');
          const row = document.querySelector(`[data-user-id="${id}"]`);
          if (row) row.remove();
          const tbody = document.getElementById('users-tbody');
          if (!tbody.children.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-secondary">Tiada pengguna dijumpai</td></tr>';
          }
          loadStats();
        }
      } catch(err) {
        showToast(err.message || 'Gagal memadam pengguna', 'error');
      }
    }

    // --- Init ---
    (async function init() {
      const isAdmin = await checkAdmin();
      if (!isAdmin) return;

      loadSidebar();
      initSSE();
      loadStats();
      loadUsers();
    })();
  </script>
</body>
</html>
