<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multichat - Peranti</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">📱 Peranti</h1>
        <p class="page-subtitle">Urus peranti WhatsApp anda</p>
      </div>
      <button class="btn btn-primary" onclick="showModal('addDeviceModal')">+ Tambah Peranti</button>
    </div>

    <div class="device-grid" id="deviceGrid">
      <div class="loading-overlay"><div class="spinner"></div><span>Memuatkan...</span></div>
    </div>
  </div>

  <!-- Add Device Modal -->
  <div class="modal-overlay" id="addDeviceModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">➕ Tambah Peranti Baru</h3>
        <button class="modal-close" onclick="hideModal('addDeviceModal')">✕</button>
      </div>

      <div class="form-group">
        <label class="form-label">Nama Peranti</label>
        <input type="text" class="form-input" id="deviceName" placeholder="cth: Bisnes Utama">
      </div>

      <label class="form-label">Kaedah Sambungan</label>
      <div class="method-toggle">
        <button type="button" class="method-btn active" data-method="qr" onclick="setMethod('qr')">📷 Imbas QR</button>
        <button type="button" class="method-btn" data-method="pairing" onclick="setMethod('pairing')">🔢 Kod Pairing</button>
      </div>

      <div id="pairingFields" class="hidden">
        <div class="form-group">
          <label class="form-label">Nombor Telefon</label>
          <input type="text" class="form-input" id="devicePhone" placeholder="cth: 60123456789">
          <p class="text-sm text-muted mt-2">Format tanpa + atau ruang. Contoh: 60123456789</p>
        </div>
      </div>

      <p class="text-sm text-muted" id="methodHint">Imbas kod QR dari WhatsApp anda. Nombor akan disahkan secara automatik.</p>

      <div class="modal-footer">
        <button class="btn btn-outline" onclick="hideModal('addDeviceModal')">Batal</button>
        <button class="btn btn-primary" id="addDeviceBtn" onclick="addDevice()">Tambah Peranti</button>
      </div>
    </div>
  </div>

  <!-- QR/Pairing Modal -->
  <div class="modal-overlay" id="qrModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="qrModalTitle">Menunggu Sambungan...</h3>
        <button class="modal-close" onclick="stopQRPolling(); hideModal('qrModal')">✕</button>
      </div>
      <div id="qrContent">
        <div class="loading-overlay"><div class="spinner"></div><span>Menjanakan kod QR...</span></div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    let currentMethod = 'qr';
    let qrPollingId = null;

    function setMethod(method) {
      currentMethod = method;
      document.querySelectorAll('.method-btn').forEach(b => b.classList.toggle('active', b.dataset.method === method));
      document.getElementById('pairingFields').classList.toggle('hidden', method === 'qr');
      document.getElementById('methodHint').textContent = method === 'qr'
        ? 'Imbas kod QR dari WhatsApp anda. Nombor akan disahkan secara automatik.'
        : 'Masukkan nombor telefon untuk mendapatkan kod pairing.';
    }

    async function loadDevices() {
      try {
        const res = await api('/api/devices');
        const devices = res.data || [];
        const grid = document.getElementById('deviceGrid');

        if (devices.length === 0) {
          grid.innerHTML = `
            <div class="empty-state" style="grid-column: 1/-1;">
              <div class="empty-state-icon">📱</div>
              <div class="empty-state-title">Tiada peranti lagi</div>
              <p class="text-muted">Klik "Tambah Peranti" untuk bermula.</p>
            </div>`;
          return;
        }

        grid.innerHTML = devices.map(d => `
          <div class="device-card ${d.status}" id="device-${d.id}">
            <div class="device-header">
              <div>
                <div class="device-name">${escapeHtml(d.name)}</div>
                <div class="device-phone">${d.phone ? formatPhone(d.phone) : '📷 QR Sahaja'}</div>
              </div>
              <span class="badge badge-${d.status === 'connected' ? 'success' : d.status === 'connecting' ? 'warning' : 'danger'}">${d.status}</span>
            </div>
            <div class="text-sm text-muted">Ditambah: ${formatDate(d.created_at)}</div>
            <div class="device-actions">
              ${d.status === 'connected'
                ? `<button class="btn btn-warning btn-sm" onclick="disconnectDevice(${d.id})">⏏ Putus</button>
                   <button class="btn btn-outline btn-sm" onclick="downloadSession(${d.id}, '${escapeHtml(d.name)}')" title="Muat turun sesi">⬇️</button>`
                : `<button class="btn btn-success btn-sm" onclick="reconnectDevice(${d.id})">🔌 Sambung</button>`}
              <button class="btn btn-danger btn-sm" onclick="deleteDevice(${d.id}, '${escapeHtml(d.name)}')">🗑 Padam</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        showToast('Gagal memuatkan peranti: ' + err.message, 'error');
      }
    }

    async function addDevice() {
      const name = document.getElementById('deviceName').value.trim();
      if (!name) return showToast('Sila masukkan nama peranti', 'warning');

      const phone = document.getElementById('devicePhone').value.trim();
      if (currentMethod === 'pairing' && !phone) return showToast('Sila masukkan nombor telefon', 'warning');

      const btn = document.getElementById('addDeviceBtn');
      btn.disabled = true;

      try {
        const res = await api('/api/devices', {
          method: 'POST',
          body: JSON.stringify({ name, phone: phone || null, method: currentMethod })
        });

        hideModal('addDeviceModal');
        document.getElementById('deviceName').value = '';
        document.getElementById('devicePhone').value = '';

        showToast('Peranti ditambah! Sila sambungkan...', 'success');
        await loadDevices();

        // Show QR/Pairing modal
        showQRModal(res.data.id, res.data.method);
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.disabled = false;
      }
    }

    function showQRModal(deviceId, method) {
      showModal('qrModal');
      document.getElementById('qrModalTitle').textContent = method === 'pairing' ? '🔢 Kod Pairing' : '📷 Imbas Kod QR';
      pollQR(deviceId);
    }

    function stopQRPolling() {
      if (qrPollingId) { clearInterval(qrPollingId); qrPollingId = null; }
    }

    async function pollQR(deviceId) {
      stopQRPolling();

      async function check() {
        try {
          const res = await api(`/api/devices/${deviceId}/qr`);

          if (res.status === 'connected') {
            stopQRPolling();
            hideModal('qrModal');
            showToast('Peranti berjaya disambungkan! 🎉', 'success');
            loadDevices();
            return;
          }

          if (res.error) {
            document.getElementById('qrContent').innerHTML = `
              <div class="text-center" style="padding:20px;">
                <p style="color:var(--danger); font-size:16px;">❌ ${escapeHtml(res.error)}</p>
                <button class="btn btn-primary mt-4" onclick="pollQR(${deviceId})">Cuba Semula</button>
              </div>`;
            stopQRPolling();
            return;
          }

          let html = '';
          if (res.qr) {
            html = `<div class="qr-container"><img src="${res.qr}" alt="QR Code"><p class="text-sm text-muted mt-2">Imbas kod QR ini di WhatsApp anda</p></div>`;
          } else if (res.pairingCode) {
            html = `<div class="pairing-code">${escapeHtml(res.pairingCode)}</div>
              <button class="btn btn-primary btn-sm" style="display:block;margin:12px auto 0;" onclick="copyPairingCode('${escapeHtml(res.pairingCode)}')">📋 Salin Kod</button>
              <p class="text-center text-muted mt-2">Masukkan kod ini di WhatsApp anda</p>`;
          } else {
            html = `<div class="loading-overlay"><div class="spinner"></div><span>Menjanakan kod...</span></div>`;
          }
          document.getElementById('qrContent').innerHTML = html;
        } catch (err) {
          console.error('[QR] Ralat:', err);
        }
      }

      await check();
      qrPollingId = setInterval(check, 3000);
    }

    async function reconnectDevice(id) {
      try {
        await api(`/api/devices/${id}/connect`, { method: 'POST', body: JSON.stringify({ method: 'qr' }) });
        showToast('Menyambung semula...', 'info');
        showQRModal(id, 'qr');
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function disconnectDevice(id) {
      if (!await confirmAction('Putuskan sambungan peranti ini?')) return;
      try {
        await api(`/api/devices/${id}/disconnect`, { method: 'POST' });
        showToast('Peranti diputuskan', 'success');
        loadDevices();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function deleteDevice(id, name) {
      if (!await confirmAction(`Padam peranti "${name}" dan semua data berkaitan?`)) return;
      try {
        await api(`/api/devices/${id}`, { method: 'DELETE' });
        showToast('Peranti dipadam', 'success');
        loadDevices();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    // Salin kod pairing ke clipboard
    function copyPairingCode(code) {
      navigator.clipboard.writeText(code).then(() => {
        showToast('Kod pairing berjaya disalin! 📋', 'success');
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = code;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Kod pairing berjaya disalin! 📋', 'success');
      });
    }

    // Muat turun data sesi peranti
    async function downloadSession(id, name) {
      try {
        showToast('Memuat turun sesi...', 'info');
        const response = await fetch(`/api/devices/${id}/download`, { credentials: 'same-origin' });
        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.error || 'Gagal memuat turun');
        }
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `sesi_${name.replace(/\s+/g, '_')}.tar.gz`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        showToast('Sesi berjaya dimuat turun! ✅', 'success');
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    // Init
    (async () => {
      if (!await initPage('devices')) return;
      await loadDevices();

      onSSE('device-status', (data) => {
        const card = document.getElementById(`device-${data.deviceId}`);

        // Peranti baru yang belum di halaman — muat sekali
        if (!card) { loadDevices(); return; }

        // Jika dipadam, buang kad
        if (data.status === 'deleted') {
          card.remove();
          const grid = document.getElementById('deviceGrid');
          if (!grid.querySelector('.device-card')) {
            grid.innerHTML = `
              <div class="empty-state" style="grid-column:1/-1;">
                <div class="empty-state-icon">📱</div>
                <div class="empty-state-title">Tiada peranti lagi</div>
                <p class="text-muted">Klik "Tambah Peranti" untuk bermula.</p>
              </div>`;
          }
          showToast(`Peranti dipadam`, 'info');
          return;
        }

        // Kemas kini kelas kad
        card.className = `device-card ${data.status}`;

        // Kemas kini badge status
        const badge = card.querySelector('.badge');
        if (badge) {
          badge.className = `badge badge-${data.status === 'connected' ? 'success' : data.status === 'connecting' ? 'warning' : 'danger'}`;
          badge.textContent = data.status;
        }

        // Kemas kini nombor telefon jika ada
        if (data.phone) {
          const phoneEl = card.querySelector('.device-phone');
          if (phoneEl) phoneEl.textContent = formatPhone(data.phone);
        }

        // Kemas kini butang tindakan
        const actions = card.querySelector('.device-actions');
        if (actions) {
          const name = card.querySelector('.device-name')?.textContent || '';
          const id = data.deviceId;
          actions.innerHTML = `
            ${data.status === 'connected'
              ? `<button class="btn btn-warning btn-sm" onclick="disconnectDevice(${id})">⏏ Putus</button>
                 <button class="btn btn-outline btn-sm" onclick="downloadSession(${id}, '${escapeHtml(name)}')" title="Muat turun sesi">⬇️</button>`
              : `<button class="btn btn-success btn-sm" onclick="reconnectDevice(${id})">🔌 Sambung</button>`}
            <button class="btn btn-danger btn-sm" onclick="deleteDevice(${id}, '${escapeHtml(name)}')">🗑 Padam</button>
          `;
        }

        showToast(`Peranti #${data.deviceId}: ${data.status}`, data.status === 'connected' ? 'success' : 'warning');
      });
    })();
  </script>
</body>
</html>
