<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multichat - Status</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">📡 Status Sistem</h1>
        <p class="page-subtitle">Pantau status perkhidmatan Multichat</p>
      </div>
      <button class="btn btn-outline" onclick="loadStatus()">🔄 Muat Semula</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon green">🟢</div>
        <div>
          <div class="stat-value" id="serverStatus">-</div>
          <div class="stat-label">Status Pelayan</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue">⏱</div>
        <div>
          <div class="stat-value" id="uptime">-</div>
          <div class="stat-label">Masa Aktif</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon purple">📱</div>
        <div>
          <div class="stat-value" id="deviceStatus">-</div>
          <div class="stat-label">Peranti Tersambung</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h3 class="card-title">📱 Status Peranti</h3>
      </div>
      <div id="deviceStatusList">
        <div class="loading-overlay"><div class="spinner"></div><span>Memuatkan...</span></div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    function formatUptime(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      return `${h}j ${m}m`;
    }

    async function loadStatus() {
      try {
        const [healthRes, devicesRes] = await Promise.all([
          api('/api/health'),
          api('/api/devices')
        ]);

        document.getElementById('serverStatus').textContent = healthRes.status === 'ok' ? 'Aktif' : 'Ralat';
        document.getElementById('uptime').textContent = formatUptime(healthRes.uptime || 0);

        const devices = devicesRes.data || [];
        const connected = devices.filter(d => d.status === 'connected').length;
        document.getElementById('deviceStatus').textContent = `${connected}/${devices.length}`;

        if (devices.length === 0) {
          document.getElementById('deviceStatusList').innerHTML = '<p class="text-center text-muted" style="padding:20px;">Tiada peranti</p>';
        } else {
          document.getElementById('deviceStatusList').innerHTML = `
            <div class="table-container">
              <table>
                <thead><tr><th>Peranti</th><th>Nombor</th><th>Status</th></tr></thead>
                <tbody>${devices.map(d => `
                  <tr>
                    <td><strong>${escapeHtml(d.name)}</strong></td>
                    <td class="text-muted">${d.phone ? formatPhone(d.phone) : '-'}</td>
                    <td><span class="badge badge-${d.status === 'connected' ? 'success' : d.status === 'connecting' ? 'warning' : 'danger'}">${d.status}</span></td>
                  </tr>
                `).join('')}</tbody>
              </table>
            </div>`;
        }
      } catch (err) {
        showToast('Gagal memuatkan status: ' + err.message, 'error');
      }
    }

    (async () => {
      if (!await initPage('status')) return;
      await loadStatus();

      onSSE('device-status', () => loadStatus());
    })();
  </script>
</body>
</html>
