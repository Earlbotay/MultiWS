<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiChat — Log Masuk</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo" id="loginLogo">
        <h1>💬 MultiChat</h1>
        <p>Sistem Pengurusan WhatsApp</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-icon-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="username" class="form-control" placeholder="Masukkan username" required autofocus>
          </div>
        </div>
        <div class="form-group">
          <label for="password">Kata Laluan</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" class="form-control" placeholder="Masukkan kata laluan" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
          Log Masuk
        </button>
      </form>
    </div>
  </div>

  <!-- Admin Login Modal (hidden by default, triggered by long-press on logo) -->
  <div class="modal-overlay" id="adminModal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3>🔐 Admin Log Masuk</h3>
        <button class="modal-close" onclick="document.getElementById('adminModal').style.display='none'">&times;</button>
      </div>
      <div class="modal-body">
        <form id="adminLoginForm">
          <div class="form-group">
            <label for="adminUsername">Admin Username</label>
            <input type="text" id="adminUsername" class="form-control" placeholder="Admin username" required>
          </div>
          <div class="form-group">
            <label for="adminPassword">Admin Kata Laluan</label>
            <input type="password" id="adminPassword" class="form-control" placeholder="Admin kata laluan" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="adminLoginBtn">Log Masuk Admin</button>
        </form>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/app.js"></script>
  <script>
    // Check if already logged in
    (async () => {
      try {
        const res = await api('/auth/me');
        if (res.success) window.location.href = '/dashboard.html';
      } catch(e) {
        // Not logged in — stay on login page
      }
    })();

    // Normal user login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Memproses...';
      try {
        const res = await api('/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        if (res.success) {
          showToast('Berjaya log masuk!', 'success');
          setTimeout(() => window.location.href = '/dashboard.html', 500);
        }
      } catch(err) {
        showToast(err.message || 'Gagal log masuk', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Log Masuk';
      }
    });

    // Admin login (modal form)
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('adminLoginBtn');
      btn.disabled = true;
      btn.textContent = 'Memproses...';
      try {
        const res = await api('/auth/admin-login', {
          method: 'POST',
          body: JSON.stringify({
            username: document.getElementById('adminUsername').value,
            password: document.getElementById('adminPassword').value
          })
        });
        if (res.success) {
          showToast('Berjaya log masuk sebagai admin!', 'success');
          setTimeout(() => window.location.href = '/dashboard.html', 500);
        }
      } catch(err) {
        showToast(err.message || 'Gagal log masuk admin', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Log Masuk Admin';
      }
    });

    // Long-press logo (5 seconds) to open admin login modal
    (function() {
      const logo = document.getElementById('loginLogo');
      let pressTimer = null;
      const HOLD_DURATION = 5000;

      function startPress(e) {
        e.preventDefault();
        pressTimer = setTimeout(() => {
          document.getElementById('adminModal').style.display = 'flex';
        }, HOLD_DURATION);
      }

      function cancelPress() {
        if (pressTimer) {
          clearTimeout(pressTimer);
          pressTimer = null;
        }
      }

      logo.addEventListener('mousedown', startPress);
      logo.addEventListener('mouseup', cancelPress);
      logo.addEventListener('mouseleave', cancelPress);
      logo.addEventListener('touchstart', startPress, { passive: false });
      logo.addEventListener('touchend', cancelPress);
      logo.addEventListener('touchcancel', cancelPress);
    })();
  </script>
</body>
</html>
