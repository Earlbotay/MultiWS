<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiChat — Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="sidebar"></div>

  <main class="main-content">
    <div class="page-header">
      <h1>📊 Dashboard</h1>
      <p>Selamat datang, <strong id="username-display">—</strong> <span id="admin-badge" class="badge badge-info" style="display:none;">Admin</span></p>
    </div>

    <!-- Stats Cards Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📱</div>
        <div class="stat-info">
          <div class="stat-number" id="stat-devices">0</div>
          <div class="stat-label">Total Peranti</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🟢</div>
        <div class="stat-info">
          <div class="stat-number" id="stat-connected">0</div>
          <div class="stat-label">Peranti Aktif</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💬</div>
        <div class="stat-info">
          <div class="stat-number" id="stat-messages">0</div>
          <div class="stat-label">Jumlah Mesej</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🤖</div>
        <div class="stat-info">
          <div class="stat-number" id="stat-autoreplies">0</div>
          <div class="stat-label">Auto-Reply Aktif</div>
        </div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="section-card">
      <h2>⚡ Tindakan Pantas</h2>
      <div class="quick-actions">
        <a href="/device.html" class="btn btn-primary">
          <span>📱</span> Tambah Peranti
        </a>
        <a href="/chat.html" class="btn btn-outline">
          <span>💬</span> Hantar Mesej
        </a>
        <a href="/blast.html" class="btn btn-outline">
          <span>🚀</span> Blast Baru
        </a>
        <a href="/warmer.html" class="btn btn-outline">
          <span>🔥</span> Warmer
        </a>
        <a href="/checker.html" class="btn btn-outline">
          <span>🔍</span> Checker
        </a>
      </div>
    </div>

    <!-- Recent Activity Placeholder -->
    <div class="section-card">
      <h2>📋 Ringkasan</h2>
      <p class="text-secondary">Gunakan menu di sebelah kiri untuk navigasi ke setiap modul.</p>
    </div>
  </main>

  <div id="toast-container"></div>
  <script src="/js/app.js"></script>
  <script>
    loadSidebar();
    initSSE();

    async function loadDashboard() {
      try {
        const res = await api('/stats');
        if (res.success) {
          const d = res.data;
          document.getElementById('username-display').textContent = d.username || '—';
          document.getElementById('stat-devices').textContent = d.totalDevices || 0;
          document.getElementById('stat-connected').textContent = d.connectedDevices || 0;
          document.getElementById('stat-messages').textContent = d.totalMessages || 0;
          document.getElementById('stat-autoreplies').textContent = d.activeAutoReplies || 0;
          // Show admin badge if admin
          if (d.role === 'admin') {
            document.getElementById('admin-badge').style.display = 'inline';
          }
        }
      } catch(err) {
        showToast('Gagal muat dashboard', 'error');
      }
    }

    loadDashboard();
  </script>
</body>
</html>
