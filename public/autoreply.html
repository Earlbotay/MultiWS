<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multichat - Auto Balas</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">🤖 Auto Balas</h1>
        <p class="page-subtitle">Tetapkan balasan automatik untuk mesej masuk</p>
      </div>
      <button class="btn btn-primary" onclick="showModal('addRuleModal')">+ Tambah Peraturan</button>
    </div>

    <div id="rulesList">
      <div class="loading-overlay"><div class="spinner"></div><span>Memuatkan...</span></div>
    </div>
  </div>

  <!-- Add Rule Modal -->
  <div class="modal-overlay" id="addRuleModal">
    <div class="modal" style="max-width:560px;">
      <div class="modal-header">
        <h3 class="modal-title">🤖 Tambah Peraturan Auto Balas</h3>
        <button class="modal-close" onclick="hideModal('addRuleModal')">✕</button>
      </div>

      <div class="form-group">
        <label class="form-label">Peranti</label>
        <select class="form-select" id="ruleDevice"></select>
      </div>

      <div class="form-group">
        <label class="form-label">Kata Kunci (pencetus)</label>
        <input type="text" class="form-input" id="ruleTrigger" placeholder="cth: harga / salam / info">
      </div>

      <div class="form-group">
        <label class="form-label">Balasan</label>
        <textarea class="form-textarea" id="ruleReply" placeholder="Mesej balasan automatik..." rows="4"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Jenis Padanan</label>
        <select class="form-select" id="ruleMatchType">
          <option value="contains">Mengandungi</option>
          <option value="exact">Tepat</option>
          <option value="startsWith">Bermula dengan</option>
        </select>
      </div>

      <div class="modal-footer">
        <button class="btn btn-outline" onclick="hideModal('addRuleModal')">Batal</button>
        <button class="btn btn-primary" onclick="addRule()">Tambah Peraturan</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    async function loadRules() {
      try {
        const res = await api('/api/autoreply');
        const rules = res.data || [];

        if (rules.length === 0) {
          document.getElementById('rulesList').innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">🤖</div>
              <div class="empty-state-title">Tiada peraturan auto balas</div>
              <p class="text-muted">Tambah peraturan untuk mula membalas mesej secara automatik.</p>
            </div>`;
          return;
        }

        document.getElementById('rulesList').innerHTML = `
          <div class="table-container">
            <table>
              <thead><tr><th>Kata Kunci</th><th>Balasan</th><th>Padanan</th><th>Status</th><th>Tindakan</th></tr></thead>
              <tbody>${rules.map(r => `
                <tr>
                  <td><strong>${escapeHtml(r.trigger_text)}</strong></td>
                  <td class="text-muted" style="max-width:250px;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(r.reply_text)}</td>
                  <td><span class="badge badge-info">${r.match_type || 'contains'}</span></td>
                  <td>
                    <span class="badge badge-${r.is_active ? 'success' : 'muted'}">${r.is_active ? 'Aktif' : 'Tidak aktif'}</span>
                  </td>
                  <td>
                    <div class="flex gap-2">
                      <button class="btn btn-outline btn-sm" onclick="toggleRule(${r.id}, ${r.is_active ? 0 : 1})">${r.is_active ? '⏸' : '▶'}</button>
                      <button class="btn btn-danger btn-sm" onclick="deleteRule(${r.id})">🗑</button>
                    </div>
                  </td>
                </tr>
              `).join('')}</tbody>
            </table>
          </div>`;
      } catch (err) {
        showToast('Gagal memuatkan: ' + err.message, 'error');
      }
    }

    async function loadDeviceOptions() {
      try {
        const res = await api('/api/devices');
        document.getElementById('ruleDevice').innerHTML = (res.data || []).map(d =>
          `<option value="${d.id}">${escapeHtml(d.name)} ${d.status === 'connected' ? '🟢' : '🔴'}</option>`
        ).join('');
      } catch (err) {}
    }

    async function addRule() {
      try {
        await api('/api/autoreply', {
          method: 'POST',
          body: JSON.stringify({
            deviceId: parseInt(document.getElementById('ruleDevice').value),
            triggerText: document.getElementById('ruleTrigger').value,
            replyText: document.getElementById('ruleReply').value,
            matchType: document.getElementById('ruleMatchType').value,
          })
        });
        hideModal('addRuleModal');
        showToast('Peraturan ditambah!', 'success');
        loadRules();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function toggleRule(id, active) {
      try {
        await api(`/api/autoreply/${id}`, { method: 'PATCH', body: JSON.stringify({ is_active: active }) });
        showToast(active ? 'Peraturan diaktifkan' : 'Peraturan dinyahaktifkan', 'success');
        loadRules();
      } catch (err) { showToast(err.message, 'error'); }
    }

    async function deleteRule(id) {
      if (!await confirmAction('Padam peraturan auto balas ini?')) return;
      try { await api(`/api/autoreply/${id}`, { method: 'DELETE' }); showToast('Peraturan dipadam', 'success'); loadRules(); }
      catch (err) { showToast(err.message, 'error'); }
    }

    (async () => {
      if (!await initPage('autoreply')) return;
      await Promise.all([loadRules(), loadDeviceOptions()]);
    })();
  </script>
</body>
</html>
