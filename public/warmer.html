<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multichat - Warmer</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">🔥 Warmer</h1>
        <p class="page-subtitle">Panaskan nombor WhatsApp anda</p>
      </div>
      <button class="btn btn-primary" onclick="showModal('createWarmerModal')">+ Cipta Sesi Warmer</button>
    </div>

    <div id="warmerList">
      <div class="loading-overlay"><div class="spinner"></div><span>Memuatkan...</span></div>
    </div>
  </div>

  <!-- Create Warmer Modal -->
  <div class="modal-overlay" id="createWarmerModal">
    <div class="modal" style="max-width:560px;">
      <div class="modal-header">
        <h3 class="modal-title">🔥 Cipta Sesi Warmer</h3>
        <button class="modal-close" onclick="hideModal('createWarmerModal')">✕</button>
      </div>

      <div class="form-group">
        <label class="form-label">Pilih Peranti (minimum 2)</label>
        <div id="deviceCheckboxes" class="flex flex-col gap-2"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Senarai Mesej (satu per baris)</label>
        <textarea class="form-textarea" id="warmerMessages" placeholder="Hai, apa khabar?&#10;Salam! Sihat?&#10;..." rows="5"></textarea>
      </div>

      <div class="flex gap-3">
        <div class="form-group" style="flex:1;">
          <label class="form-label">Interval Min (saat)</label>
          <input type="number" class="form-input" id="warmerIntervalMin" value="30" min="10">
        </div>
        <div class="form-group" style="flex:1;">
          <label class="form-label">Interval Max (saat)</label>
          <input type="number" class="form-input" id="warmerIntervalMax" value="60" min="10">
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-outline" onclick="hideModal('createWarmerModal')">Batal</button>
        <button class="btn btn-primary" onclick="createWarmer()">Cipta Warmer</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    async function loadWarmers() {
      try {
        const res = await api('/api/warmer');
        const sessions = res.data || [];

        if (sessions.length === 0) {
          document.getElementById('warmerList').innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">🔥</div>
              <div class="empty-state-title">Tiada sesi warmer</div>
              <p class="text-muted">Cipta sesi warmer untuk mula memanaskan nombor.</p>
            </div>`;
          return;
        }

        document.getElementById('warmerList').innerHTML = `
          <div class="table-container">
            <table>
              <thead><tr><th>ID</th><th>Status</th><th>Peranti</th><th>Mesej Dihantar</th><th>Tindakan</th></tr></thead>
              <tbody>${sessions.map(s => `
                <tr>
                  <td>#${s.id}</td>
                  <td><span class="badge badge-${s.status === 'running' ? 'success' : s.status === 'stopped' ? 'danger' : 'muted'}">${s.status}</span></td>
                  <td>${s.device_count || '-'} peranti</td>
                  <td>${s.messages_sent || 0}</td>
                  <td>
                    <div class="flex gap-2">
                      ${s.status !== 'running' ? `<button class="btn btn-success btn-sm" onclick="startWarmer(${s.id})">▶ Mula</button>` : ''}
                      ${s.status === 'running' ? `<button class="btn btn-warning btn-sm" onclick="stopWarmer(${s.id})">⏸ Henti</button>` : ''}
                      <button class="btn btn-outline btn-sm" onclick="deleteWarmer(${s.id})">🗑</button>
                    </div>
                  </td>
                </tr>
              `).join('')}</tbody>
            </table>
          </div>`;
      } catch (err) {
        showToast('Gagal memuatkan warmer: ' + err.message, 'error');
      }
    }

    async function loadDeviceCheckboxes() {
      try {
        const res = await api('/api/devices');
        const devices = res.data || [];
        document.getElementById('deviceCheckboxes').innerHTML = devices.map(d => `
          <label style="display:flex; align-items:center; gap:8px; padding:8px; background:var(--bg-input); border-radius:var(--radius-sm); cursor:pointer;">
            <input type="checkbox" value="${d.id}" class="warmer-device">
            <span>${escapeHtml(d.name)} ${d.status === 'connected' ? '🟢' : '🔴'}</span>
          </label>
        `).join('');
      } catch (err) {}
    }

    async function createWarmer() {
      const deviceIds = [...document.querySelectorAll('.warmer-device:checked')].map(c => parseInt(c.value));
      const messages = document.getElementById('warmerMessages').value.split('\n').map(m => m.trim()).filter(Boolean);

      if (deviceIds.length < 2) return showToast('Pilih sekurang-kurangnya 2 peranti', 'warning');
      if (messages.length === 0) return showToast('Sila masukkan sekurang-kurangnya satu mesej', 'warning');

      try {
        await api('/api/warmer', {
          method: 'POST',
          body: JSON.stringify({
            deviceIds,
            messages,
            intervalMin: parseInt(document.getElementById('warmerIntervalMin').value) || 30,
            intervalMax: parseInt(document.getElementById('warmerIntervalMax').value) || 60,
          })
        });
        hideModal('createWarmerModal');
        showToast('Sesi warmer dicipta!', 'success');
        loadWarmers();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function startWarmer(id) {
      try { await api(`/api/warmer/${id}/start`, { method: 'POST' }); showToast('Warmer dimulakan', 'success'); loadWarmers(); }
      catch (err) { showToast(err.message, 'error'); }
    }

    async function stopWarmer(id) {
      try { await api(`/api/warmer/${id}/stop`, { method: 'POST' }); showToast('Warmer dihentikan', 'info'); loadWarmers(); }
      catch (err) { showToast(err.message, 'error'); }
    }

    async function deleteWarmer(id) {
      if (!await confirmAction('Padam sesi warmer ini?')) return;
      try { await api(`/api/warmer/${id}`, { method: 'DELETE' }); showToast('Warmer dipadam', 'success'); loadWarmers(); }
      catch (err) { showToast(err.message, 'error'); }
    }

    (async () => {
      if (!await initPage('warmer')) return;
      await Promise.all([loadWarmers(), loadDeviceCheckboxes()]);
    })();
  </script>
</body>
</html>
