<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multichat - Broadcast</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">📢 Broadcast</h1>
        <p class="page-subtitle">Hantar mesej pukal ke senarai nombor</p>
      </div>
      <button class="btn btn-primary" onclick="showModal('createBlastModal')">+ Cipta Broadcast</button>
    </div>

    <div id="blastList">
      <div class="loading-overlay"><div class="spinner"></div><span>Memuatkan...</span></div>
    </div>
  </div>

  <!-- Create Blast Modal -->
  <div class="modal-overlay" id="createBlastModal">
    <div class="modal" style="max-width:560px;">
      <div class="modal-header">
        <h3 class="modal-title">📢 Cipta Broadcast Baru</h3>
        <button class="modal-close" onclick="hideModal('createBlastModal')">✕</button>
      </div>

      <div class="form-group">
        <label class="form-label">Nama Broadcast</label>
        <input type="text" class="form-input" id="blastName" placeholder="cth: Promo Raya 2025">
      </div>

      <div class="form-group">
        <label class="form-label">Peranti</label>
        <select class="form-select" id="blastDevice"></select>
      </div>

      <div class="form-group">
        <label class="form-label">Mesej</label>
        <textarea class="form-textarea" id="blastMessage" placeholder="Tulis mesej di sini..." rows="4"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Senarai Nombor (satu per baris)</label>
        <textarea class="form-textarea" id="blastPhones" placeholder="60123456789&#10;60198765432&#10;..." rows="5"></textarea>
      </div>

      <div class="flex gap-3">
        <div class="form-group" style="flex:1;">
          <label class="form-label">Delay Min (saat)</label>
          <input type="number" class="form-input" id="blastDelayMin" value="5" min="1">
        </div>
        <div class="form-group" style="flex:1;">
          <label class="form-label">Delay Max (saat)</label>
          <input type="number" class="form-input" id="blastDelayMax" value="15" min="1">
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-outline" onclick="hideModal('createBlastModal')">Batal</button>
        <button class="btn btn-primary" onclick="createBlast()">Cipta Broadcast</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    async function loadBlasts() {
      try {
        const res = await api('/api/blast');
        const jobs = res.data || [];

        if (jobs.length === 0) {
          document.getElementById('blastList').innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">📢</div>
              <div class="empty-state-title">Tiada broadcast</div>
              <p class="text-muted">Cipta broadcast pertama anda untuk mula.</p>
            </div>`;
          return;
        }

        document.getElementById('blastList').innerHTML = `
          <div class="table-container">
            <table>
              <thead><tr>
                <th>Nama</th><th>Status</th><th>Penerima</th><th>Mesej</th><th>Dicipta</th><th>Tindakan</th>
              </tr></thead>
              <tbody>${jobs.map(j => `
                <tr>
                  <td><strong>${escapeHtml(j.name)}</strong></td>
                  <td><span class="badge badge-${j.status === 'completed' ? 'success' : j.status === 'running' ? 'info' : j.status === 'paused' ? 'warning' : 'muted'}">${j.status}</span></td>
                  <td>${j.total_recipients || 0}</td>
                  <td class="text-muted" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(j.message || '')}</td>
                  <td class="text-muted text-sm">${formatDate(j.created_at)}</td>
                  <td>
                    <div class="flex gap-2">
                      ${j.status === 'pending' || j.status === 'paused' ? `<button class="btn btn-success btn-sm" onclick="startBlast(${j.id})">▶ Mula</button>` : ''}
                      ${j.status === 'running' ? `<button class="btn btn-warning btn-sm" onclick="pauseBlast(${j.id})">⏸ Jeda</button>` : ''}
                      ${j.status === 'running' ? `<button class="btn btn-danger btn-sm" onclick="cancelBlast(${j.id})">⏹ Batal</button>` : ''}
                      <button class="btn btn-outline btn-sm" onclick="deleteBlast(${j.id})">🗑</button>
                    </div>
                  </td>
                </tr>
              `).join('')}</tbody>
            </table>
          </div>`;
      } catch (err) {
        showToast('Gagal memuatkan broadcast: ' + err.message, 'error');
      }
    }

    async function loadDeviceOptions() {
      try {
        const res = await api('/api/devices');
        const sel = document.getElementById('blastDevice');
        sel.innerHTML = (res.data || []).map(d =>
          `<option value="${d.id}">${escapeHtml(d.name)} ${d.status === 'connected' ? '🟢' : '🔴'}</option>`
        ).join('');
      } catch (err) {}
    }

    async function createBlast() {
      try {
        const phones = document.getElementById('blastPhones').value.split('\n').map(p => p.trim()).filter(Boolean);
        await api('/api/blast', {
          method: 'POST',
          body: JSON.stringify({
            name: document.getElementById('blastName').value,
            deviceId: parseInt(document.getElementById('blastDevice').value),
            message: document.getElementById('blastMessage').value,
            phones,
            delayMin: parseInt(document.getElementById('blastDelayMin').value) || 5,
            delayMax: parseInt(document.getElementById('blastDelayMax').value) || 15,
          })
        });
        hideModal('createBlastModal');
        showToast('Broadcast dicipta!', 'success');
        loadBlasts();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function startBlast(id) {
      try { await api(`/api/blast/${id}/start`, { method: 'POST' }); showToast('Broadcast dimulakan', 'success'); loadBlasts(); }
      catch (err) { showToast(err.message, 'error'); }
    }

    async function pauseBlast(id) {
      try { await api(`/api/blast/${id}/pause`, { method: 'POST' }); showToast('Broadcast dijedakan', 'info'); loadBlasts(); }
      catch (err) { showToast(err.message, 'error'); }
    }

    async function cancelBlast(id) {
      if (!await confirmAction('Batalkan broadcast ini?')) return;
      try { await api(`/api/blast/${id}/cancel`, { method: 'POST' }); showToast('Broadcast dibatalkan', 'warning'); loadBlasts(); }
      catch (err) { showToast(err.message, 'error'); }
    }

    async function deleteBlast(id) {
      if (!await confirmAction('Padam broadcast ini?')) return;
      try { await api(`/api/blast/${id}`, { method: 'DELETE' }); showToast('Broadcast dipadam', 'success'); loadBlasts(); }
      catch (err) { showToast(err.message, 'error'); }
    }

    (async () => {
      if (!await initPage('blast')) return;
      await Promise.all([loadBlasts(), loadDeviceOptions()]);
    })();
  </script>
</body>
</html>
