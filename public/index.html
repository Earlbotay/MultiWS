<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multichat - Log Masuk</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <!-- Long press logo 5s → admin login -->
      <div class="login-logo" id="loginLogo">💬</div>
      <h1 class="login-title">Multichat</h1>
      <p class="login-subtitle">Platform automasi WhatsApp anda</p>

      <form id="loginForm" autocomplete="on">
        <div class="form-group">
          <label class="form-label">Nama Pengguna</label>
          <input type="text" class="form-input" id="username" placeholder="Masukkan nama pengguna" required autofocus autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">Kata Laluan</label>
          <input type="password" class="form-input" id="password" placeholder="Masukkan kata laluan" required autocomplete="current-password">
        </div>
        <button type="submit" class="login-btn" id="loginBtn">Log Masuk</button>
      </form>

      <div class="login-footer">🔒 Sambungan selamat</div>
    </div>
  </div>

  <!-- Admin Login Modal (triggered by 5s long press on logo) -->
  <div class="admin-login-overlay" id="adminOverlay">
    <div class="admin-login-card">
      <div class="admin-login-icon">🛡️</div>
      <h2 class="admin-login-title">Log Masuk Pentadbir</h2>
      <form id="adminLoginForm">
        <div class="form-group">
          <label class="form-label">Nama Pengguna Admin</label>
          <input type="text" class="form-input" id="adminUsername" placeholder="Admin" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">Kata Laluan Admin</label>
          <input type="password" class="form-input" id="adminPassword" placeholder="Kata laluan" autocomplete="current-password">
        </div>
        <button type="submit" class="login-btn" style="background: linear-gradient(135deg, #4f46e5, #7c3aed);">🛡️ Masuk sebagai Admin</button>
      </form>
      <p class="login-footer" style="cursor:pointer;" onclick="document.getElementById('adminOverlay').classList.remove('active')">Batal</p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Check if already logged in
    (async () => {
      try {
        const res = await api('/api/auth/me');
        if (res.data) window.location.href = '/dashboard.html';
      } catch (e) {}
    })();

    // === Long press logo 5 seconds → show admin login ===
    let pressTimer = null;
    let pressStart = 0;
    const logo = document.getElementById('loginLogo');

    function startPress(e) {
      e.preventDefault();
      pressStart = Date.now();
      logo.classList.add('pressed');
      pressTimer = setTimeout(() => {
        logo.classList.remove('pressed');
        document.getElementById('adminOverlay').classList.add('active');
        document.getElementById('adminUsername').focus();
      }, 5000);
    }

    function endPress() {
      clearTimeout(pressTimer);
      logo.classList.remove('pressed');
    }

    logo.addEventListener('mousedown', startPress);
    logo.addEventListener('mouseup', endPress);
    logo.addEventListener('mouseleave', endPress);
    logo.addEventListener('touchstart', startPress, { passive: false });
    logo.addEventListener('touchend', endPress);
    logo.addEventListener('touchcancel', endPress);

    // User login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Sedang log masuk...';

      try {
        const res = await api('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        showToast('Log masuk berjaya!', 'success');
        setTimeout(() => window.location.href = '/dashboard.html', 500);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Log Masuk';
      }
    });

    // Admin login
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true;

      try {
        const res = await api('/api/auth/admin-login', {
          method: 'POST',
          body: JSON.stringify({
            username: document.getElementById('adminUsername').value,
            password: document.getElementById('adminPassword').value
          })
        });
        showToast('Log masuk admin berjaya!', 'success');
        setTimeout(() => window.location.href = '/admin.html', 500);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
      }
    });

    // Close admin overlay on outside click
    document.getElementById('adminOverlay').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('active');
    });
  </script>
</body>
</html>
