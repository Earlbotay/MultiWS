<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multichat - Ruang Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="content">
    <div class="content-header" style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;">
      <div>
        <h1>Ruang Chat</h1>
        <p>Hantar dan terima mesej WhatsApp</p>
      </div>
      <div class="form-group" style="margin-bottom:0; min-width: 220px;">
        <select class="form-control" id="deviceSelect">
          <option value="">-- Pilih Peranti --</option>
        </select>
      </div>
    </div>

    <div class="chat-layout" id="chatLayout">
      <!-- Left: Conversation List -->
      <div class="chat-sidebar" id="chatSidebar">
        <div class="chat-sidebar-header">
          <div class="chat-search-wrap">
            <i class="fas fa-magnifying-glass"></i>
            <input type="text" class="chat-search" id="chatSearch" placeholder="Cari perbualan...">
          </div>
        </div>
        <div class="chat-list" id="chatList">
          <div class="empty-state" style="padding: 32px 16px;">
            <i class="fas fa-comments" style="font-size:36px;"></i>
            <p>Pilih peranti untuk melihat perbualan</p>
          </div>
        </div>
      </div>

      <!-- Right: Messages -->
      <div class="chat-main" id="chatMain">
        <div class="chat-empty" id="chatEmpty">
          <div style="text-align:center;">
            <i class="fas fa-comments"></i>
            <p>Pilih perbualan untuk mula bersembang</p>
          </div>
        </div>
        <!-- Hidden by default: active chat view -->
        <div id="activeChatView" style="display: none; flex-direction: column; flex: 1;">
          <div class="chat-main-header">
            <div class="chat-main-header-info">
              <div class="chat-avatar" id="chatAvatar">?</div>
              <div>
                <h3 id="chatContactName">-</h3>
                <span style="font-size:12px; color:#888;" id="chatContactPhone">-</span>
              </div>
            </div>
          </div>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="Taip mesej..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()" title="Hantar Mesej">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    let devices = [];
    let conversations = [];
    let currentDeviceId = null;
    let currentConversation = null; // remoteJid
    let messagePollTimer = null;
    let conversationPollTimer = null;

    document.addEventListener('DOMContentLoaded', async () => {
      await loadDevices();

      // Device change
      document.getElementById('deviceSelect').addEventListener('change', (e) => {
        currentDeviceId = e.target.value;
        currentConversation = null;
        showEmptyChat();
        if (currentDeviceId) {
          loadConversations();
          startConversationPoll();
        } else {
          stopAllPolls();
          document.getElementById('chatList').innerHTML = `
            <div class="empty-state" style="padding: 32px 16px;">
              <i class="fas fa-comments" style="font-size:36px;"></i>
              <p>Pilih peranti untuk melihat perbualan</p>
            </div>`;
        }
      });

      // Search filter
      document.getElementById('chatSearch').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        filterConversations(query);
      });

      // Send on Enter
      document.getElementById('messageInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
    });

    async function loadDevices() {
      try {
        const data = await api.get('/api/devices');
        devices = (data.data || data.devices || []).filter(d => d.status === 'connected');
        const select = document.getElementById('deviceSelect');
        const current = select.value;
        select.innerHTML = '<option value="">-- Pilih Peranti --</option>' +
          devices.map(d => `<option value="${d.id}" ${d.id === current ? 'selected' : ''}>${escapeHtml(d.name)}${d.phone ? ' (' + formatPhone(d.phone) + ')' : ''}</option>`).join('');
      } catch (_) {}
    }

    async function loadConversations() {
      if (!currentDeviceId) return;
      try {
        const data = await api.get(`/api/chat/conversations/${currentDeviceId}`);
        conversations = data.data || data.conversations || [];
        renderConversations();
      } catch (err) {
        document.getElementById('chatList').innerHTML = `
          <div class="empty-state" style="padding: 32px 16px;">
            <i class="fas fa-exclamation-triangle" style="font-size:36px;"></i>
            <p>Gagal memuatkan perbualan</p>
          </div>`;
      }
    }

    function renderConversations() {
      const list = document.getElementById('chatList');
      const searchQuery = document.getElementById('chatSearch').value.toLowerCase();

      let filtered = conversations;
      if (searchQuery) {
        filtered = conversations.filter(c => {
          const name = (c.name || c.remoteJid || '').toLowerCase();
          const phone = (c.remoteJid || '').toLowerCase();
          return name.includes(searchQuery) || phone.includes(searchQuery);
        });
      }

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty-state" style="padding: 32px 16px;">
            <i class="fas fa-comments" style="font-size:36px;"></i>
            <p>${searchQuery ? 'Tiada hasil carian' : 'Tiada perbualan'}</p>
          </div>`;
        return;
      }

      list.innerHTML = filtered.map(c => {
        const name = c.name || formatPhone(c.remoteJid);
        const initial = (c.name || c.remoteJid || '?')[0].toUpperCase();
        const lastMsg = c.lastMessage || '';
        const time = c.lastMessageTime ? timeAgo(c.lastMessageTime) : '';
        const isActive = currentConversation === c.remoteJid;

        return `
          <div class="chat-item ${isActive ? 'active' : ''}" onclick="selectConversation('${c.remoteJid}', '${escapeHtml(name)}')">
            <div class="chat-avatar">${initial}</div>
            <div class="chat-item-info">
              <div class="chat-item-name">${escapeHtml(name)}</div>
              <div class="chat-item-last">${escapeHtml(lastMsg)}</div>
            </div>
            ${time ? `<div class="chat-item-time">${time}</div>` : ''}
          </div>`;
      }).join('');
    }

    function filterConversations(query) {
      renderConversations();
    }

    function showEmptyChat() {
      document.getElementById('chatEmpty').style.display = 'flex';
      document.getElementById('activeChatView').style.display = 'none';
      stopMessagePoll();
    }

    function showActiveChat() {
      document.getElementById('chatEmpty').style.display = 'none';
      document.getElementById('activeChatView').style.display = 'flex';
    }

    async function selectConversation(remoteJid, name) {
      currentConversation = remoteJid;
      showActiveChat();
      renderConversations(); // Update active state

      const initial = (name || '?')[0].toUpperCase();
      document.getElementById('chatAvatar').textContent = initial;
      document.getElementById('chatContactName').textContent = name;
      document.getElementById('chatContactPhone').textContent = formatPhone(remoteJid);

      document.getElementById('chatMessages').innerHTML = `
        <div class="loading-overlay">
          <div class="spinner"></div>
          <span>Memuatkan mesej...</span>
        </div>`;

      await loadMessages();
      startMessagePoll();
      document.getElementById('messageInput').focus();
    }

    async function loadMessages() {
      if (!currentDeviceId || !currentConversation) return;
      try {
        const data = await api.get(`/api/chat/messages/${currentDeviceId}/${encodeURIComponent(currentConversation)}`);
        const messages = data.data || data.messages || [];
        renderMessages(messages);
      } catch (err) {
        document.getElementById('chatMessages').innerHTML = `
          <div class="loading-overlay">
            <i class="fas fa-exclamation-triangle" style="font-size:24px; color:#e74c3c;"></i>
            <span>Gagal memuatkan mesej</span>
          </div>`;
      }
    }

    function renderMessages(messages) {
      const container = document.getElementById('chatMessages');
      if (messages.length === 0) {
        container.innerHTML = `
          <div style="text-align:center; padding:40px; color:#888;">
            <p>Tiada mesej lagi. Mulakan perbualan!</p>
          </div>`;
        return;
      }

      container.innerHTML = messages.map(m => {
        const isOut = m.fromMe || m.from_me;
        const text = m.message || m.body || '';
        const time = m.timestamp ? formatTime(m.timestamp) : '';
        return `
          <div class="bubble ${isOut ? 'bubble-out' : 'bubble-in'}">
            <div>${escapeHtml(text)}</div>
            <div class="bubble-time">${time}</div>
          </div>`;
      }).join('');

      // Scroll to bottom
      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
      if (!currentDeviceId || !currentConversation) return;
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      input.focus();

      // Optimistic UI: add bubble immediately
      const container = document.getElementById('chatMessages');
      const tempBubble = document.createElement('div');
      tempBubble.className = 'bubble bubble-out';
      tempBubble.innerHTML = `
        <div>${escapeHtml(text)}</div>
        <div class="bubble-time">Menghantar... <i class="fas fa-clock" style="font-size:10px;"></i></div>
      `;
      container.appendChild(tempBubble);
      container.scrollTop = container.scrollHeight;

      try {
        await api.post(`/api/chat/send/${currentDeviceId}`, {
          to: currentConversation,
          message: text
        });
        // Update the temp bubble
        tempBubble.querySelector('.bubble-time').innerHTML = formatTime(new Date().toISOString());
      } catch (err) {
        tempBubble.querySelector('.bubble-time').innerHTML = `<span style="color:#e74c3c;">Gagal dihantar</span>`;
        showToast(err.message || 'Gagal menghantar mesej', 'error');
      }
    }

    // ---- Polling ----
    function startMessagePoll() {
      stopMessagePoll();
      messagePollTimer = setInterval(loadMessages, 5000);
    }

    function stopMessagePoll() {
      if (messagePollTimer) {
        clearInterval(messagePollTimer);
        messagePollTimer = null;
      }
    }

    function startConversationPoll() {
      stopConversationPoll();
      conversationPollTimer = setInterval(loadConversations, 10000);
    }

    function stopConversationPoll() {
      if (conversationPollTimer) {
        clearInterval(conversationPollTimer);
        conversationPollTimer = null;
      }
    }

    function stopAllPolls() {
      stopMessagePoll();
      stopConversationPoll();
    }

    // Cleanup on leave
    window.addEventListener('beforeunload', stopAllPolls);
  </script>

</body>
</html>
