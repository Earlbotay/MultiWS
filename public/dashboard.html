<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multichat - Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Dashboard</h1>
        <p class="page-subtitle" id="greeting">Selamat datang!</p>
      </div>
    </div>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-icon purple">📱</div>
        <div>
          <div class="stat-value" id="totalDevices">-</div>
          <div class="stat-label">Jumlah Peranti</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">🟢</div>
        <div>
          <div class="stat-value" id="activeDevices">-</div>
          <div class="stat-label">Peranti Aktif</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue">💬</div>
        <div>
          <div class="stat-value" id="totalMessages">-</div>
          <div class="stat-label">Jumlah Mesej</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon yellow">🤖</div>
        <div>
          <div class="stat-value" id="activeAutoReplies">-</div>
          <div class="stat-label">Auto Balas Aktif</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red">📢</div>
        <div>
          <div class="stat-value" id="runningBlasts">-</div>
          <div class="stat-label">Broadcast Berjalan</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h3 class="card-title">📱 Peranti Anda</h3>
        <a href="/device.html" class="btn btn-primary btn-sm">Urus Peranti</a>
      </div>
      <div id="deviceList">
        <div class="loading-overlay"><div class="spinner"></div><span>Memuatkan...</span></div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    (async () => {
      const user = await initPage('dashboard');
      if (!user) return;

      const hour = new Date().getHours();
      const greeting = hour < 12 ? 'Selamat pagi' : hour < 18 ? 'Selamat petang' : 'Selamat malam';
      document.getElementById('greeting').textContent = `${greeting}, ${user.username}! 👋`;

      // Load stats
      try {
        const res = await api('/api/stats');
        const s = res.data;
        document.getElementById('totalDevices').textContent = s.totalDevices || 0;
        document.getElementById('activeDevices').textContent = s.activeDevices || 0;
        document.getElementById('totalMessages').textContent = s.totalMessages || 0;
        document.getElementById('activeAutoReplies').textContent = s.activeAutoReplies || 0;
        document.getElementById('runningBlasts').textContent = s.runningBlasts || 0;
      } catch (err) {
        showToast('Gagal memuatkan statistik', 'error');
      }

      // Load devices
      try {
        const res = await api('/api/devices');
        const devices = res.data || [];
        if (devices.length === 0) {
          document.getElementById('deviceList').innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">📱</div>
              <div class="empty-state-title">Tiada peranti</div>
              <p class="text-muted">Tambah peranti pertama anda untuk mula.</p>
              <a href="/device.html" class="btn btn-primary mt-4">+ Tambah Peranti</a>
            </div>`;
        } else {
          document.getElementById('deviceList').innerHTML = `
            <div class="device-grid">
              ${devices.map(d => `
                <div class="device-card ${d.status}">
                  <div class="device-header">
                    <div>
                      <div class="device-name">${escapeHtml(d.name)}</div>
                      <div class="device-phone">${d.phone ? formatPhone(d.phone) : 'QR Sahaja'}</div>
                    </div>
                    <span class="badge badge-${d.status === 'connected' ? 'success' : d.status === 'connecting' ? 'warning' : 'danger'}">${d.status}</span>
                  </div>
                </div>
              `).join('')}
            </div>`;
        }
      } catch (err) {
        document.getElementById('deviceList').innerHTML = '<p class="text-center text-muted">Gagal memuatkan peranti</p>';
      }

      // SSE updates
      onSSE('device-status', (data) => {
        showToast(`Peranti #${data.deviceId}: ${data.status}`, data.status === 'connected' ? 'success' : 'warning');
      });
    })();
  </script>
</body>
</html>
