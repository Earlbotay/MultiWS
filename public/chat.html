<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multichat - Sembang</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">💬 Sembang</h1>
        <p class="page-subtitle">Lihat dan hantar mesej WhatsApp</p>
      </div>
      <div class="flex gap-3 items-center">
        <label class="form-label" style="margin:0;">Peranti:</label>
        <select class="form-select" id="deviceSelect" style="width:200px;" onchange="loadConversations()">
          <option value="">Pilih peranti...</option>
        </select>
      </div>
    </div>

    <div class="chat-layout" id="chatLayout" style="display:none;">
      <div class="chat-sidebar">
        <div class="chat-sidebar-header">
          <input type="text" class="form-input" id="searchChat" placeholder="🔍 Cari perbualan..." oninput="filterConversations()">
        </div>
        <div class="chat-list" id="chatList">
          <div class="empty-state"><p class="text-muted">Tiada perbualan</p></div>
        </div>
      </div>
      <div class="chat-main">
        <div class="chat-messages" id="chatMessages">
          <div class="empty-state">
            <div class="empty-state-icon">💬</div>
            <div class="empty-state-title">Pilih perbualan</div>
            <p class="text-muted">Klik pada perbualan di sebelah kiri untuk melihat mesej</p>
          </div>
        </div>
        <div class="chat-input-area" id="chatInputArea" style="display:none;">
          <input type="text" class="form-input" id="messageInput" placeholder="Taip mesej..." onkeydown="if(event.key==='Enter')sendMessage()">
          <button class="btn btn-primary" onclick="sendMessage()">Hantar</button>
        </div>
      </div>
    </div>

    <div id="noDevice" class="empty-state">
      <div class="empty-state-icon">📱</div>
      <div class="empty-state-title">Pilih Peranti</div>
      <p class="text-muted">Pilih peranti dari dropdown di atas untuk melihat perbualan</p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    let conversations = [];
    let currentDeviceId = null;
    let currentJid = null;

    async function loadDeviceList() {
      try {
        const res = await api('/api/devices');
        const devices = res.data || [];
        const sel = document.getElementById('deviceSelect');
        sel.innerHTML = '<option value="">Pilih peranti...</option>' +
          devices.map(d => `<option value="${d.id}">${escapeHtml(d.name)} ${d.status === 'connected' ? '🟢' : '🔴'}</option>`).join('');
      } catch (err) {
        showToast('Gagal memuatkan senarai peranti', 'error');
      }
    }

    async function loadConversations() {
      const deviceId = document.getElementById('deviceSelect').value;
      if (!deviceId) {
        document.getElementById('chatLayout').style.display = 'none';
        document.getElementById('noDevice').style.display = '';
        return;
      }

      currentDeviceId = parseInt(deviceId);
      document.getElementById('chatLayout').style.display = '';
      document.getElementById('noDevice').style.display = 'none';

      try {
        const res = await api(`/api/chat/conversations/${currentDeviceId}`);
        conversations = res.data || [];
        renderConversations();
      } catch (err) {
        showToast('Gagal memuatkan perbualan: ' + err.message, 'error');
      }
    }

    function renderConversations() {
      const search = document.getElementById('searchChat').value.toLowerCase();
      const filtered = conversations.filter(c =>
        !search || (c.remote_jid && c.remote_jid.toLowerCase().includes(search))
      );

      const list = document.getElementById('chatList');
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state"><p class="text-muted">Tiada perbualan</p></div>';
        return;
      }

      list.innerHTML = filtered.map(c => {
        const jid = c.remote_jid || '';
        const name = jid.split('@')[0];
        const isActive = currentJid === jid ? ' active' : '';
        return `
          <div class="chat-item${isActive}" onclick="openChat('${escapeHtml(jid)}')">
            <span class="chat-item-time">${formatTime(c.last_time)}</span>
            <div class="chat-item-name">${escapeHtml(name)}</div>
            <div class="chat-item-preview">${escapeHtml(c.last_message || 'Tiada mesej')}</div>
          </div>`;
      }).join('');
    }

    function filterConversations() { renderConversations(); }

    async function openChat(jid) {
      currentJid = jid;
      renderConversations();

      try {
        const res = await api(`/api/chat/messages/${currentDeviceId}/${encodeURIComponent(jid)}`);
        const messages = res.data || [];

        const messagesEl = document.getElementById('chatMessages');
        if (messages.length === 0) {
          messagesEl.innerHTML = '<div class="empty-state"><p class="text-muted">Tiada mesej lagi</p></div>';
        } else {
          messagesEl.innerHTML = messages.map(m => `
            <div class="message-bubble ${m.is_outgoing ? 'outgoing' : 'incoming'}">
              ${escapeHtml(m.message || '')}
              <div class="message-time">${formatTime(m.timestamp)}</div>
            </div>
          `).join('');
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        document.getElementById('chatInputArea').style.display = '';
      } catch (err) {
        showToast('Gagal memuatkan mesej: ' + err.message, 'error');
      }
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message || !currentJid || !currentDeviceId) return;

      input.value = '';
      try {
        await api(`/api/chat/send/${currentDeviceId}`, {
          method: 'POST',
          body: JSON.stringify({ to: currentJid.split('@')[0], message })
        });

        // Add to UI optimistically
        const messagesEl = document.getElementById('chatMessages');
        messagesEl.innerHTML += `
          <div class="message-bubble outgoing">
            ${escapeHtml(message)}
            <div class="message-time">baru je</div>
          </div>`;
        messagesEl.scrollTop = messagesEl.scrollHeight;
      } catch (err) {
        showToast('Gagal menghantar: ' + err.message, 'error');
      }
    }

    // Init
    (async () => {
      if (!await initPage('chat')) return;
      await loadDeviceList();

      onSSE('message-sent', () => {
        if (currentJid && currentDeviceId) openChat(currentJid);
      });
    })();
  </script>
</body>
</html>
